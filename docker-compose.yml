services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    logging:
      driver: "none"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    logging:
      driver: "none"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: node server.js
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/webhook-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - API_KEY=${API_KEY}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - DASHBOARD_ORIGIN=${DASHBOARD_ORIGIN}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: node src/worker.js
    environment:
      - MONGO_URI=mongodb://mongo:27017/webhook-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo-data: