services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    logging:
      driver: "none"

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    logging:
      driver: "none"

  api:
    build: .
    command: node server.js
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/webhook-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - API_KEY=${API_KEY}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - DASHBOARD_ORIGIN=${DASHBOARD_ORIGIN}
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    command: node src/worker.js
    environment:
      - MONGO_URI=mongodb://mongo:27017/webhook-db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      - mongo
      - redis

volumes:
  mongo-data: